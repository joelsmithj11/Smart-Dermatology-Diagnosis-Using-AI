{% extends "base.html" %}

{% block content %}
<div class="glass-card" style="border-top: 4px solid var(--primary); max-width: 400px; margin: 2rem auto;">
    <div class="text-center mb-4">
        <div
            style="width: 60px; height: 60px; background: rgba(59, 130, 246, 0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; color: var(--primary);">
            <i class="fa-solid fa-shield-halved" style="font-size: 1.5rem;"></i>
        </div>
        <h2>Two-Factor Auth</h2>
        <p class="text-gray" style="font-size: 0.9rem;">Enter the code sent to your email</p>
    </div>

    <form action="{{ url_for('auth.validate_otp') }}" method="POST">
        <div class="form-group">
            <label class="form-label">OTP Code</label>
            <div style="position: relative;">
                <i class="fa-solid fa-key"
                    style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                <input type="text" name="otp_code" class="form-control"
                    style="padding-left: 2.5rem; letter-spacing: 4px; font-weight: bold; text-align: center;"
                    placeholder="------" maxlength="6" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.8rem;">
            Verify & Login <i class="fa-solid fa-check-circle"></i>
        </button>
    </form>

    <div class="text-center mt-3">
        <a href="{{ url_for('auth.login') }}"
            style="color: var(--text-gray); font-size: 0.8rem; text-decoration: none;">
            <i class="fa-solid fa-arrow-left"></i> Back to Login
        </a>
    </div>
</div>
{% endblock %}
