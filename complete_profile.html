{% extends "base.html" %}

{% block title %}Complete Your Profile{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin-top: 80px;">
    <div class="card shadow-lg">
        <div class="card-body p-5">
            <h2 class="text-center mb-4">Complete Your Profile</h2>
            <p class="text-muted text-center mb-4">
                Please provide your details to continue using Smart Dermatology Diagnosis
            </p>

            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('main.complete_profile') }}">
                <div class="mb-3">
                    <label for="patient_name" class="form-label">Patient Name *</label>
                    <input type="text" class="form-control" id="patient_name" name="patient_name" required>
                </div>

                <div class="mb-3">
                    <label for="gender" class="form-label">Gender *</label>
                    <select class="form-select" id="gender" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="location" class="form-label">City/Area *</label>
                    <input type="text" class="form-control" id="location" name="location" required>
                </div>

                <div class="mb-3">
                    <label for="country" class="form-label">Country *</label>
                    <select class="form-select" id="country" name="country" required onchange="loadStates()">
                        <option value="">Select Country</option>
                        <!-- Common Instant Access -->
                        <optgroup label="Popular">
                            <option value="India">India</option>
                            <option value="United States">United States</option>
                            <option value="United Kingdom">United Kingdom</option>
                            <option value="Canada">Canada</option>
                            <option value="Australia">Australia</option>
                        </optgroup>
                        <optgroup label="All Countries" id="all-countries-list">
                            <!-- Populated via JS instantly -->
                        </optgroup>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="state" class="form-label">State *</label>
                    <div id="state-container">
                        <select class="form-select" id="state" name="state" required>
                            <option value="">Select State</option>
                        </select>
                    </div>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">
                        Complete Profile
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // 1. Instant Country List (Alphabetical)
    const ALL_COUNTRIES = [
        "Afghanistan", "Albania", "Algeria", "Andorra", "Angola", "Antigua and Barbuda", "Argentina", "Armenia", "Australia", "Austria", "Azerbaijan",
        "Bahamas", "Bahrain", "Bangladesh", "Barbados", "Belarus", "Belgium", "Belize", "Benin", "Bhutan", "Bolivia", "Bosnia and Herzegovina", "Botswana", "Brazil", "Brunei", "Bulgaria", "Burkina Faso", "Burundi",
        "Cabo Verde", "Cambodia", "Cameroon", "Canada", "Central African Republic", "Chad", "Chile", "China", "Colombia", "Comoros", "Congo (Congo-Brazzaville)", "Costa Rica", "Croatia", "Cuba", "Cyprus", "Czechia (Czech Republic)",
        "Democratic Republic of the Congo", "Denmark", "Djibouti", "Dominica", "Dominican Republic",
        "Ecuador", "Egypt", "El Salvador", "Equatorial Guinea", "Eritrea", "Estonia", "Eswatini (fmr. Swaziland)", "Ethiopia",
        "Fiji", "Finland", "France",
        "Gabon", "Gambia", "Georgia", "Germany", "Ghana", "Greece", "Grenada", "Guatemala", "Guinea", "Guinea-Bissau", "Guyana",
        "Haiti", "Holy See", "Honduras", "Hungary",
        "Iceland", "India", "Indonesia", "Iran", "Iraq", "Ireland", "Israel", "Italy",
        "Jamaica", "Japan", "Jordan",
        "Kazakhstan", "Kenya", "Kiribati", "Kuwait", "Kyrgyzstan",
        "Laos", "Latvia", "Lebanon", "Lesotho", "Liberia", "Libya", "Liechtenstein", "Lithuania", "Luxembourg",
        "Madagascar", "Malawi", "Malaysia", "Maldives", "Mali", "Malta", "Marshall Islands", "Mauritania", "Mauritius", "Mexico", "Micronesia", "Moldova", "Monaco", "Mongolia", "Montenegro", "Morocco", "Mozambique", "Myanmar (formerly Burma)",
        "Namibia", "Nauru", "Nepal", "Netherlands", "New Zealand", "Nicaragua", "Niger", "Nigeria", "North Korea", "North Macedonia", "Norway",
        "Oman",
        "Pakistan", "Palau", "Palestine State", "Panama", "Papua New Guinea", "Paraguay", "Peru", "Philippines", "Poland", "Portugal",
        "Qatar",
        "Romania", "Russia", "Rwanda",
        "Saint Kitts and Nevis", "Saint Lucia", "Saint Vincent and the Grenadines", "Samoa", "San Marino", "Sao Tome and Principe", "Saudi Arabia", "Senegal", "Serbia", "Seychelles", "Sierra Leone", "Singapore", "Slovakia", "Slovenia", "Solomon Islands", "Somalia", "South Africa", "South Korea", "South Sudan", "Spain", "Sri Lanka", "Sudan", "Suriname", "Sweden", "Switzerland", "Syria",
        "Tajikistan", "Tanzania", "Thailand", "Timor-Leste", "Togo", "Tonga", "Trinidad and Tobago", "Tunisia", "Turkey", "Turkmenistan", "Tuvalu",
        "Uganda", "Ukraine", "United Arab Emirates", "United Kingdom", "United States", "Uruguay", "Uzbekistan",
        "Vanuatu", "Venezuela", "Vietnam",
        "Yemen",
        "Zambia", "Zimbabwe"
    ];

    // 2. Pre-loaded States for Popular Countries (Instant)
    const PRELOADED_STATES = {
        "India": [
            "Andhra Pradesh", "Arunachal Pradesh", "Assam", "Bihar", "Chhattisgarh", "Goa", "Gujarat", "Haryana", "Himachal Pradesh", "Jharkhand", "Karnataka", "Kerala", "Madhya Pradesh", "Maharashtra", "Manipur", "Meghalaya", "Mizoram", "Nagaland", "Odisha", "Punjab", "Rajasthan", "Sikkim", "Tamil Nadu", "Telangana", "Tripura", "Uttar Pradesh", "Uttarakhand", "West Bengal", "Andaman and Nicobar Islands", "Chandigarh", "Dadra and Nagar Haveli and Daman and Diu", "Delhi", "Jammu and Kashmir", "Ladakh", "Lakshadweep", "Puducherry"
        ],
        "United States": [
            "Alabama", "Alaska", "Arizona", "Arkansas", "California", "Colorado", "Connecticut", "Delaware", "Florida", "Georgia", "Hawaii", "Idaho", "Illinois", "Indiana", "Iowa", "Kansas", "Kentucky", "Louisiana", "Maine", "Maryland", "Massachusetts", "Michigan", "Minnesota", "Mississippi", "Missouri", "Montana", "Nebraska", "Nevada", "New Hampshire", "New Jersey", "New Mexico", "New York", "North Carolina", "North Dakota", "Ohio", "Oklahoma", "Oregon", "Pennsylvania", "Rhode Island", "South Carolina", "South Dakota", "Tennessee", "Texas", "Utah", "Vermont", "Virginia", "Washington", "West Virginia", "Wisconsin", "Wyoming"
        ]
    };

    // 3. Populate Countries Instantly
    function initCountries() {
        const list = document.getElementById('all-countries-list');
        ALL_COUNTRIES.forEach(country => {
            // Skip common ones already listed
            if (["India", "United States", "United Kingdom", "Canada", "Australia"].includes(country)) return;

            const option = document.createElement('option');
            option.value = country;
            option.text = country;
            list.appendChild(option);
        });
    }

    // 4. Load States Logic
    async function loadStates() {
        const countrySelect = document.getElementById('country');
        const stateContainer = document.getElementById('state-container');
        const selectedCountry = countrySelect.value;

        // Reset to Select
        stateContainer.innerHTML = `
            <select class="form-select" id="state" name="state" required>
                <option value="">Select State</option>
            </select>
        `;
        const stateSelect = document.getElementById('state');

        if (!selectedCountry) return;

        // Check Local Preloaded
        if (PRELOADED_STATES[selectedCountry]) {
            PRELOADED_STATES[selectedCountry].sort().forEach(state => {
                const opt = document.createElement('option');
                opt.value = state;
                opt.text = state;
                stateSelect.add(opt);
            });
            return;
        }

        // Try Fetching from API (with fallback to text input)
        stateSelect.innerHTML = '<option value="">Loading states...</option>';

        try {
            // Using Postman/CountriesNow efficient public endpoint
            // OR simpler: use geonames-like simple JSON if accessible
            // Let's rely on countriesnow.space again but handle failure gracefully
            const response = await fetch('https://countriesnow.space/api/v0.1/countries/states', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ country: selectedCountry })
            });

            const data = await response.json();

            stateSelect.innerHTML = '<option value="">Select State</option>'; // Clear loading

            if (!data.error && data.data.states.length > 0) {
                data.data.states.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.name;
                    opt.text = s.name;
                    stateSelect.add(opt);
                });
            } else {
                throw new Error("No states found");
            }

        } catch (error) {
            console.warn("State loading failed or empty, switching to text input.", error);
            // Switch to Text Input if API fails
            stateContainer.innerHTML = `
                <input type="text" class="form-control" id="state" name="state" placeholder="Enter State/Province manually" required>
            `;
        }
    }

    document.addEventListener('DOMContentLoaded', initCountries);
</script>

<style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
    }

    .card {
        border-radius: 15px;
        border: none;
    }

    .form-control,
    .form-select {
        border-radius: 8px;
        padding: 12px;
    }

    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-weight: 600;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }
</style>
{% endblock %}
